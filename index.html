<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TutorOS — Tuition Centre Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathlive@0.101.2/dist/mathlive-static.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathlive@0.101.2/dist/mathlive-fonts.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathlive@0.101.2/dist/mathlive.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #F9FAFB; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9CA3AF; }
    * { text-wrap: pretty; }
    input, textarea, button { font-family: inherit; }
    @keyframes tos-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes tos-pop  { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }
    select option { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared.jsx"></script>

<!-- Mock data — each loads before the page that consumes it (depends on shared.jsx for DS) -->
<script type="text/babel" src="mocks/superAdmin.mock.jsx"></script>
<script type="text/babel" src="mocks/adminDashboard.mock.jsx"></script>
<script type="text/babel" src="mocks/adminPages.mock.jsx"></script>
<script type="text/babel" src="mocks/teacherDashboard.mock.jsx"></script>
<script type="text/babel" src="mocks/teacherPages.mock.jsx"></script>
<script type="text/babel" src="mocks/lessonPlanner.mock.jsx"></script>
<script type="text/babel" src="mocks/studentDashboard.mock.jsx"></script>
<script type="text/babel" src="mocks/homework.mock.jsx"></script>
<script type="text/babel" src="mocks/reports.mock.jsx"></script>
<script type="text/babel" src="mocks/settings.mock.jsx"></script>
<script type="text/babel" src="mocks/communications.mock.jsx"></script>

<!-- Reports module (consumes reports.mock; consumed by Teacher/Student/Admin pages) -->
<script type="text/babel" src="Reports.jsx"></script>

<!-- Settings module (per-role tabbed settings; consumes settings.mock) -->
<script type="text/babel" src="Settings.jsx"></script>

<!-- Communications module (announcements + messages; consumes communications.mock + SuperAdmin's SACommsPage) -->
<script type="text/babel" src="Communications.jsx"></script>

<script type="text/babel" src="LandingPage.jsx"></script>
<script type="text/babel" src="SuperAdmin.jsx"></script>
<script type="text/babel" src="AdminDashboard.jsx"></script>
<script type="text/babel" src="AdminPages.jsx"></script>
<script type="text/babel" src="TeacherDashboard.jsx"></script>
<script type="text/babel" src="TeacherPages.jsx"></script>
<script type="text/babel" src="StudentDashboard.jsx"></script>
<script type="text/babel" src="Homework.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#43b190",
  "density": "compact"
}/*EDITMODE-END*/;

// Build a breadcrumb trail (e.g. "Reports › All Reports") from the active page id
// using NAV_CONFIG, mirroring the sidebar's parent/sub structure.
const buildCrumbs = (role, page) => {
  const cfg = window.NAV_CONFIG[role];
  if (!cfg) return [];
  const parentId = window.navParentId(page);
  const section  = page.includes(':') ? page.split(':')[1] : null;
  const all = [...(cfg.items || []), ...(cfg.bottom || [])];
  const item = all.find(i => i.id === parentId || i.id === parentId + 's' || parentId === i.id + 's')
    || all.find(i => page.startsWith(i.id));
  if (!item) return [{ label: parentId.charAt(0).toUpperCase() + parentId.slice(1) }];
  const crumbs = [{ label: item.label }];
  if (section && Array.isArray(item.sub)) {
    const sub = item.sub.find(s => s.id === `${parentId}:${section}`);
    if (sub) crumbs.push({ label: sub.label });
  }
  return crumbs;
};

const TopBar = ({ view, page, onBack, accent, comms, onNavigate, collapsed, onToggleSidebar }) => {
  const [hovBack, setHovBack] = React.useState(false);
  const crumbs = buildCrumbs(view, page);
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 6,
      padding: '0 18px', height: 52,
      borderBottom: `1px solid ${DS.border}`,
      boxShadow: '0 1px 2px rgba(16,24,40,0.04)',
      background: '#FFFFFF', flexShrink: 0, zIndex: 20,
    }}>
      {/* Sidebar collapse toggle */}
      <button onClick={onToggleSidebar} title={collapsed ? 'Expand sidebar' : 'Collapse sidebar'} style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: 'none', border: 'none', cursor: 'pointer',
        color: '#6B7280', padding: 7, borderRadius: 7, marginLeft: -4,
      }}>
        <Icon name="sidebar" size={17} />
      </button>
      <div style={{ width: 1, height: 18, background: DS.border, margin: '0 6px 0 2px' }} />

      {/* Breadcrumb trail */}
      <nav style={{ display: 'flex', alignItems: 'center', gap: 6, minWidth: 0, flex: 1 }}>
        {crumbs.map((c, i) => (
          <React.Fragment key={i}>
            {i > 0 && <Icon name="chevron_r" size={13} color={DS.faint} />}
            <span style={{
              fontSize: 13.5,
              fontWeight: i === crumbs.length - 1 ? 600 : 500,
              color: i === crumbs.length - 1 ? DS.text : DS.muted,
              whiteSpace: 'nowrap',
            }}>{c.label}</span>
          </React.Fragment>
        ))}
      </nav>

      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#16A34A' }} />
        <span style={{ fontSize: 12, color: '#6B7280' }}>Spring Term 2026</span>
      </div>
      {/* Live notification bell — aggregates unread announcements + messages */}
      {comms && window.NotificationBell
        ? <NotificationBell comms={comms} onNavigate={onNavigate} />
        : (
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#6B7280', padding: '4px', display: 'flex' }}>
            <Icon name="bell" size={16} />
          </button>
        )}
      <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#6B7280', padding: '4px', display: 'flex' }}>
        <Icon name="search" size={16} />
      </button>
      <div style={{ width: 1, height: 18, background: DS.border, margin: '0 2px' }} />
      <button onClick={onBack}
        onMouseEnter={() => setHovBack(true)} onMouseLeave={() => setHovBack(false)}
        style={{
          display: 'flex', alignItems: 'center', gap: 5,
          background: hovBack ? DS.surfaceHover : 'none', border: 'none', cursor: 'pointer',
          color: '#6B7280', fontSize: 12, padding: '5px 8px', borderRadius: 6,
        }}>
        ← Exit
      </button>
    </div>
  );
};

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView]     = React.useState('landing');
  const [page, setPage]     = React.useState('dashboard');
  const [plannerArgs, setPlannerArgs] = React.useState(null);
  const [renderKey, setRenderKey] = React.useState(0);
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);

  // Admin-settable primary accent. Persisted to localStorage so it survives
  // reloads independently of the dev Tweaks panel (which writes to disk). The
  // effective accent is the admin override when set, otherwise the Tweaks value.
  const [accentOverride, setAccentOverride] = React.useState(() => {
    try { return localStorage.getItem('tutoros.accent') || null; } catch (e) { return null; }
  });
  const accent = accentOverride || tweaks.accent;
  React.useEffect(() => {
    // Settings → Appearance writes the live accent through this bridge.
    window.__setAccent = (hex) => {
      try { hex ? localStorage.setItem('tutoros.accent', hex) : localStorage.removeItem('tutoros.accent'); } catch (e) {}
      setAccentOverride(hex || null);
    };
    window.__getAccent = () => { try { return localStorage.getItem('tutoros.accent') || window.DS.accent; } catch (e) { return window.DS.accent; } };
    return () => { delete window.__setAccent; delete window.__getAccent; };
  }, []);

  // Communications state is lifted here (localStorage isn't reactive) so the
  // notification bell + sidebar badges update live across the page, topbar and
  // sidebar. The context is the active role's demo identity (see COMMS_SELF).
  const commsRole = view === 'landing' ? 'admin' : view;
  const commsCtx  = React.useMemo(() => window.commsContext ? window.commsContext(commsRole) : null, [commsRole]);
  const comms     = window.useComms ? window.useComms(commsCtx) : null;

  React.useLayoutEffect(() => {
    if (window.DS) {
      window.DS.accent       = accent;
      window.DS.accentHover  = accent;
      window.DS.accentLight  = accent + '18';
      window.DS.accentBorder = accent + '55';
    }
    setRenderKey(k => k + 1);
  }, [accent]);

  // Expand a bare nav id (e.g. "reports") to its first sub-section ("reports:overview")
  // when that item has a dropdown, so the active section is always canonical — this
  // keeps the sidebar dropdown + sub-item highlighting consistent no matter the entry
  // point (sidebar click, PPTX export, Tweaks panel).
  const normalizePage = (role, pg) => {
    if (!pg || pg.includes(':')) return pg || 'dashboard';
    const cfg = window.NAV_CONFIG[role];
    if (!cfg) return pg;
    const item = [...(cfg.items || []), ...(cfg.bottom || [])].find(i => i.id === pg);
    return item && item.sub && item.sub.length ? item.sub[0].id : pg;
  };

  const enterApp = (role) => { setView(role || 'admin'); setPage('dashboard'); };

  // Expose navigation for PPTX export
  React.useEffect(() => {
    window.__navigate = (role, pg) => {
      if (role === 'landing') { setView('landing'); setPage('dashboard'); }
      else { setView(role); setPage(normalizePage(role, pg)); }
    };
    window.__openLessonPlanner = (group, date, mode) => {
      setPlannerArgs({ group, date, mode });
      setView('teacher');
      setPage('lesson_planner');
    };
  }, []);
  const handleNav = (p)   => { setPlannerArgs(null); setPage(normalizePage(view, p)); };
  const isApp = view !== 'landing';

  const renderContent = () => {
    // Nav items with sub-sections route on a `<parent>:<section>` id (e.g.
    // reports:browse). Split the active page into its parent and section so the
    // owning page can open straight to that section.
    const parent  = page.split(':')[0];
    const section = page.includes(':') ? page.split(':')[1] : null;

    // Settings is available to every role and lives in its own module.
    if (parent === 'settings') return <SettingsPage role={view} section={section} />;
    // Communications is shared across all roles (announcements + messages),
    // backed by the lifted comms state. Superadmin's view is platform-scoped.
    if (parent === 'comms' && comms) return <CommunicationsPage role={view} section={section} comms={comms} />;
    if (view === 'superadmin') {
      if (parent === 'dashboard') return <SuperAdminDashboard />;
      return <SuperAdminPages page={parent} />;
    }
    if (view === 'admin') {
      if (parent === 'dashboard') return <AdminDashboard />;
      if (parent === 'reports')   return <AdminReportsConfig section={section} />;
      return <AdminPages page={parent} section={section} />;
    }
    if (view === 'teacher') {
      if (parent === 'classes')        return <TeacherPages page="classes" />;
      if (parent === 'timetable')      return <TeacherPages page="timetable" />;
      if (parent === 'homework')       return <TeacherPages page="homework" section={section} />;
      if (parent === 'progress')       return <TeacherPages page="progress" />;
      if (parent === 'attendance')     return <TeacherPages page="attendance" />;
      if (parent === 'tracking')       return <TeacherPages page="tracking" />;
      if (parent === 'reports')        return <TeacherPages page="reports" />;
      if (parent === 'lesson_planner') return <TeacherPages page="lesson_planner" plannerArgs={plannerArgs} />;
      return <TeacherDashboard />;
    }
    if (view === 'student') {
      return <StudentDashboard page={parent} section={section} onNav={handleNav} />;
    }
    return null;
  };

  return (
    <div key={renderKey} style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {isApp ? (
        <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
          <Sidebar
            role={view}
            active={page}
            onNav={handleNav}
            onRoleSwitch={(role) => { setView(role); setPage('dashboard'); }}
            badges={comms ? { comms: comms.unread.total } : null}
            collapsed={sidebarCollapsed}
          />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#FFFFFF' }}>
            <TopBar view={view} page={page} onBack={() => setView('landing')} accent={tweaks.accent}
              comms={comms} onNavigate={(role, pg) => window.__navigate(role, pg)}
              collapsed={sidebarCollapsed} onToggleSidebar={() => setSidebarCollapsed(c => !c)} />
            <div style={{ flex: 1, overflow: 'auto' }}>
              {renderContent()}
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, overflow: 'auto' }}>
          <LandingPage onEnterApp={() => enterApp('admin')} />
        </div>
      )}

      <TweaksPanel>
        <TweakSection label="Brand" />
        <TweakColor label="Accent colour" value={accent} onChange={v => { setTweak('accent', v); window.__setAccent && window.__setAccent(v); }} />
        <TweakSection label="Navigate to" />
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          {[
            ['landing',     null,           'Marketing site'],
            ['superadmin',  'dashboard',    'SuperAdmin — Overview'],
            ['superadmin',  'centres',      'SuperAdmin — Centres'],
            ['superadmin',  'users',        'SuperAdmin — Users'],
            ['superadmin',  'revenue',      'SuperAdmin — Revenue'],
            ['superadmin',  'engagement',   'SuperAdmin — Engagement'],
            ['superadmin',  'system',       'SuperAdmin — System Health'],
            ['superadmin',  'comms',        'SuperAdmin — Communications'],
            ['superadmin',  'security',     'SuperAdmin — Security & Audit'],
            ['superadmin',  'controls',     'SuperAdmin — Platform Controls'],
            ['superadmin',  'settings',     'SuperAdmin — Settings'],
            ['admin',    'dashboard',  'Admin — Dashboard'],
            ['admin',    'students',   'Admin — Students'],
            ['admin',    'classes',    'Admin — Classes'],
            ['admin',    'teachers',   'Admin — Teachers'],
            ['admin',    'schedule',   'Admin — Schedule'],
            ['admin',    'invoices',   'Admin — Invoices'],
            ['admin',    'reports',    'Admin — Reports'],
            ['admin',    'comms',      'Admin — Communications'],
            ['admin',    'settings',   'Admin — Settings'],
            ['teacher',  'dashboard',  'Teacher — Dashboard'],
            ['teacher',  'classes',    'Teacher — My Classes'],
            ['teacher',  'timetable',  'Teacher — Timetable'],
            ['teacher',  'lesson_planner','Teacher — Lesson Planner'],
            ['teacher',  'homework',   'Teacher — Homework'],
            ['teacher',  'attendance', 'Teacher — Attendance'],
            ['teacher',  'progress',   'Teacher — Progress'],
            ['teacher',  'tracking',   'Teacher — Tracking'],
            ['teacher',  'reports',    'Teacher — Reports'],
            ['teacher',  'comms',      'Teacher — Communications'],
            ['teacher',  'settings',   'Teacher — Settings'],
            ['student',  'dashboard',  'Student — Overview'],
            ['student',  'homework',   'Student — Homework'],
            ['student',  'progress',   'Student — Progress'],
            ['student',  'sessions',   'Student — Sessions'],
            ['student',  'reports',    'Student — Reports'],
            ['student',  'comms',      'Student — Communications'],
            ['student',  'settings',   'Student — Settings'],
          ].map(([role, pg, label]) => {
            const isActive = pg === null ? view === 'landing' : view === role && page.split(':')[0] === pg;
            return (
              <button key={label}
                onClick={() => {
                  if (pg === null) { setView('landing'); }
                  else { setView(role); setPage(normalizePage(role, pg)); }
                }}
                style={{
                  padding: '6px 10px', borderRadius: 6,
                  border: `1px solid ${isActive ? (tweaks.accent + '55') : '#E5E7EB'}`,
                  background: isActive ? (tweaks.accent + '18') : '#F9FAFB',
                  color: isActive ? tweaks.accent : '#374151',
                  fontSize: 12, fontWeight: isActive ? 600 : 400,
                  cursor: 'pointer', textAlign: 'left',
                }}
              >{label}</button>
            );
          })}
        </div>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
