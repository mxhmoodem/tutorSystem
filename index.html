  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; background: #F9FAFB; }

    @keyframes tos-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes tos-pop  { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }

<script type="text/babel" src="Timesheets.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#43b190",
  "density": "compact"
}/*EDITMODE-END*/;

// Build a breadcrumb trail (e.g. "Reports › All Reports") from the active page id
// using NAV_CONFIG, mirroring the sidebar's parent/sub structure.
const buildCrumbs = (role, page) => {
  const cfg = window.NAV_CONFIG[role];
  if (!cfg) return [];
  const parentId = window.navParentId(page);
  const section  = page.includes(':') ? page.split(':')[1] : null;
  const all = [...(cfg.items || []), ...(cfg.bottom || [])];
  // A sub matches the active page by exact id, a compound `<parent>:<section>` id,
  // or a "whole page" sub (Teachers) the page-parent folds onto (teacher_profile).
  const subMatch = (s) => s.id === page || s.id === `${parentId}:${section}` || parentId === s.id || parentId + 's' === s.id || parentId + 's' === s.id.split(':')[0];
  let item = all.find(i => i.id === parentId || i.id === parentId + 's' || parentId === i.id + 's');
  let sub  = null;
  if (!item) {
    // The page may live under a group whose subs don't share the parent id (Staff).
    for (const i of all) {
      if (Array.isArray(i.sub)) { const m = i.sub.find(subMatch); if (m) { item = i; sub = m; break; } }
    }
  }
  if (!item) item = all.find(i => page.startsWith(i.id));
  if (!item) return [{ label: parentId.charAt(0).toUpperCase() + parentId.slice(1) }];
  const crumbs = [{ label: item.label }];
  if (!sub && section && Array.isArray(item.sub)) sub = item.sub.find(s => s.id === `${parentId}:${section}`);
  if (sub) crumbs.push({ label: sub.label });
  return crumbs;
};

const TopBar = ({ view, page, onBack, accent, comms, onNavigate, collapsed, onToggleSidebar }) => {
  const [hovBack, setHovBack] = React.useState(false);
  const crumbs = buildCrumbs(view, page);
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 6,
      padding: '0 18px', height: 52,
      borderBottom: `1px solid ${DS.border}`,
      boxShadow: '0 1px 2px rgba(16,24,40,0.04)',
      // Glassmorphism: translucent white + blur so the grey content frosts
      // through as it scrolls under the sticky header.
      position: 'sticky', top: 0,
      background: 'rgba(255,255,255,0.72)',
      backdropFilter: 'saturate(180%) blur(12px)',
      WebkitBackdropFilter: 'saturate(180%) blur(12px)',
      flexShrink: 0, zIndex: 30,
    }}>
      {/* Sidebar collapse toggle */}
      <button onClick={onToggleSidebar} title={collapsed ? 'Expand sidebar' : 'Collapse sidebar'} style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: 'none', border: 'none', cursor: 'pointer',
        color: '#6B7280', padding: 7, borderRadius: 7, marginLeft: -4,
      }}>
        <Icon name="sidebar" size={17} />
      </button>
      <div style={{ width: 1, height: 18, background: DS.border, margin: '0 6px 0 2px' }} />

      {/* Breadcrumb trail */}
      <nav style={{ display: 'flex', alignItems: 'center', gap: 6, minWidth: 0, flex: 1 }}>
        {crumbs.map((c, i) => (
          <React.Fragment key={i}>
            {i > 0 && <Icon name="chevron_r" size={13} color={DS.faint} />}
            <span style={{
              fontSize: 13.5,
              fontWeight: i === crumbs.length - 1 ? 600 : 500,
              color: i === crumbs.length - 1 ? DS.text : DS.muted,
              whiteSpace: 'nowrap',
            }}>{c.label}</span>
          </React.Fragment>
        ))}
      </nav>

      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
        <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#16A34A' }} />
        <span style={{ fontSize: 12, color: '#6B7280' }}>Spring Term 2026</span>
      </div>
      {/* Live notification bell — aggregates unread announcements + messages */}
      {comms && window.NotificationBell
        ? <NotificationBell comms={comms} onNavigate={onNavigate} />
        : (
          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#6B7280', padding: '4px', display: 'flex' }}>
            <Icon name="bell" size={16} />
          </button>
        )}
      <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#6B7280', padding: '4px', display: 'flex' }}>
        <Icon name="search" size={16} />
      </button>
      <div style={{ width: 1, height: 18, background: DS.border, margin: '0 2px' }} />
      <button onClick={onBack}
        onMouseEnter={() => setHovBack(true)} onMouseLeave={() => setHovBack(false)}
        style={{
          display: 'flex', alignItems: 'center', gap: 5,
          background: hovBack ? DS.surfaceHover : 'none', border: 'none', cursor: 'pointer',
          color: '#6B7280', fontSize: 12, padding: '5px 8px', borderRadius: 6,
        }}>
        ← Exit
      </button>
    </div>
  );
};

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView]     = React.useState('landing');
  const [page, setPage]     = React.useState('dashboard');
  const [plannerArgs, setPlannerArgs] = React.useState(null);
  const [renderKey, setRenderKey] = React.useState(0);
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  // Public account-claim link (teacher/student invite). When set, the claim page
  // is shown full-screen over the app/landing. `''` is a valid (not-found) id, so
  // we gate on `!== null`. window.__openClaim(id) is the entry point.
  const [claimId, setClaimId] = React.useState(null);

  // Admin-settable primary accent. Persisted to localStorage so it survives
  // reloads independently of the dev Tweaks panel (which writes to disk). The
  // effective accent is the admin override when set, otherwise the Tweaks value.
  const [accentOverride, setAccentOverride] = React.useState(() => {
    try { return localStorage.getItem('tutoros.accent') || null; } catch (e) { return null; }
  });
  const accent = accentOverride || tweaks.accent;
  React.useEffect(() => {
    // Settings → Appearance writes the live accent through this bridge.
    window.__setAccent = (hex) => {
      try { hex ? localStorage.setItem('tutoros.accent', hex) : localStorage.removeItem('tutoros.accent'); } catch (e) {}
      setAccentOverride(hex || null);
    };
    window.__getAccent = () => { try { return localStorage.getItem('tutoros.accent') || window.DS.accent; } catch (e) { return window.DS.accent; } };
    return () => { delete window.__setAccent; delete window.__getAccent; };
  }, []);

  // Active centre — a staff account can be linked to several centres (each its own
  // subscription); the sidebar switcher lets them hop between them. A cosmetic
  // reframe in this prototype (centre name/branding), persisted like the accent.
  const CENTRE_FALLBACK = (window.ONB_CENTRE && window.ONB_CENTRE.id) || 'bm';
  const [activeCentre, setActiveCentre] = React.useState(() => {
    try { return localStorage.getItem('tutoros.activeCentre') || CENTRE_FALLBACK; } catch (e) { return CENTRE_FALLBACK; }
  });
  React.useEffect(() => {
    window.__setCentre = (id) => {
      try { id ? localStorage.setItem('tutoros.activeCentre', id) : localStorage.removeItem('tutoros.activeCentre'); } catch (e) {}
      setActiveCentre(id || CENTRE_FALLBACK);
    };
    window.__getCentre = () => { try { return localStorage.getItem('tutoros.activeCentre') || CENTRE_FALLBACK; } catch (e) { return CENTRE_FALLBACK; } };
    return () => { delete window.__setCentre; delete window.__getCentre; };
  }, []);

  // Resolve the signed-in staff identity's memberships → one switcher entry per
  // centre (with its granted roles). Admin/teacher only; students/superadmin keep
  // the static product header. Reuses the onboarding store's membership list.
  const sub = window.useSubscriptionStore ? window.useSubscriptionStore() : null;
  const centreNav = React.useMemo(() => {
    if (!sub || (view !== 'admin' && view !== 'teacher') || !window.ONB_SESSION) return null;
    // The Centres page (subscription store) is the single source of truth for the
    // account's owned centres; the switcher lists the active (non-archived) ones so
    // a centre added there shows up here live (the store is cross-instance reactive).
    const list = (sub.centres || []).filter(c => c.status !== 'archived');
    if (!list.length) return null;
    const centres = list.map(c => ({ id: c.id, name: c.name, accent: c.accent || null, city: c.city || '', roles: [c.isPrimary ? 'Primary centre' : 'Centre'] }));
    const activeId = centres.some(c => c.id === activeCentre) ? activeCentre : centres[0].id;
    const active = centres.find(c => c.id === activeId) || centres[0];
    return { centre: { id: activeId, name: active.name }, centres, planUsage: { used: (sub.centres || []).length, max: sub.plan.maxCentres } };
  }, [sub && sub.centres, sub && sub.planId, view, activeCentre]);

  // Communications state is lifted here (localStorage isn't reactive) so the
  // notification bell + sidebar badges update live across the page, topbar and
  // sidebar. The context is the active role's demo identity (see COMMS_SELF).
  // Public, full-screen, unauthenticated views — gated ahead of the app shell
  // (no sidebar/topbar), like the landing & claim pages.
  const isAuth = view === 'login' || view === 'signup';
  const commsRole = (view === 'landing' || isAuth) ? 'admin' : view;
  const commsCtx  = React.useMemo(() => window.commsContext ? window.commsContext(commsRole) : null, [commsRole]);
  const comms     = window.useComms ? window.useComms(commsCtx) : null;

  React.useLayoutEffect(() => {
    if (window.DS) {
      window.DS.accent       = accent;
      window.DS.accentHover  = accent;
      window.DS.accentLight  = accent + '18';
      window.DS.accentBorder = accent + '55';
    }
    setRenderKey(k => k + 1);
  }, [accent]);

  // Expand a bare nav id (e.g. "reports") to its first sub-section ("reports:overview")
  // when that item has a dropdown, so the active section is always canonical — this
  // keeps the sidebar dropdown + sub-item highlighting consistent no matter the entry
  // point (sidebar click, PPTX export, Tweaks panel).
  const normalizePage = (role, pg) => {
    if (!pg || pg.includes(':')) return pg || 'dashboard';
    const cfg = window.NAV_CONFIG[role];
    if (!cfg) return pg;
    const item = [...(cfg.items || []), ...(cfg.bottom || [])].find(i => i.id === pg);
    return item && item.sub && item.sub.length ? item.sub[0].id : pg;
  };

  const enterApp = (role, pg) => { setView(role || 'admin'); setPage(normalizePage(role || 'admin', pg || 'dashboard')); };

  // Expose navigation for PPTX export
  React.useEffect(() => {
    window.__navigate = (role, pg) => {
      setClaimId(null);   // leaving a claim link returns to the app
      if (role === 'landing') { setView('landing'); setPage('dashboard'); }
      // Public auth views aren't role nav — don't normalize against NAV_CONFIG.
      else if (role === 'login' || role === 'signup') { setView(role); setPage('dashboard'); }
      // The standalone "Set up centre" page is gone — setup is now a right-hand drawer
      // on the Centres page. Rewrite any admin/setup navigation to open it for the
      // active centre (covers the dashboard banner, signup CTA and sub-flow back links).
      else if (role === 'admin' && pg === 'setup') {
        window.__centresIntent = { setup: (window.__getCentre ? window.__getCentre() : null) };
        setView('admin'); setPage('centres');
      }
      else { setView(role); setPage(normalizePage(role, pg)); }
    };
    // Open the public account-claim page for a mock invite token / claim code.
    window.__openClaim = (id) => setClaimId(id || '');
    window.__openLessonPlanner = (group, date, mode) => {
      setPlannerArgs({ group, date, mode });
      setView('teacher');
      setPage('lesson_planner');
    };
  }, []);
  const handleNav = (p)   => { setPlannerArgs(null); setPage(normalizePage(view, p)); };
  const isApp = view !== 'landing' && !isAuth;

  const renderContent = () => {
    // Nav items with sub-sections route on a `<parent>:<section>` id (e.g.
    // reports:browse). Split the active page into its parent and section so the
    // owning page can open straight to that section.
    const parent  = page.split(':')[0];
    const section = page.includes(':') ? page.split(':')[1] : null;

    if (parent === 'settings') return <SettingsPage role={view} section={section} />;
    // Communications is shared across all roles (announcements + messages),
    // backed by the lifted comms state. Superadmin's view is platform-scoped.
    if (parent === 'comms' && comms) return <CommunicationsPage role={view} section={section} comms={comms} />;
    if (view === 'superadmin') {
      if (parent === 'dashboard') return <SuperAdminDashboard />;
      return <SuperAdminPages page={parent} />;
    }
    if (view === 'admin') {
      if (parent === 'dashboard') return <AdminDashboard />;
      if (parent === 'centres')   return <CentresPage />;
      if (parent === 'reports')   return <AdminReportsConfig section={section} />;
      // Onboarding flows (Onboarding.jsx) — full-page admin routes reached via adminNav.
      // (The "Set up centre" checklist is now the Centres page's right-hand drawer;
      // admin/setup is rewritten to it in __navigate, so there's no standalone route.)
      if (parent === 'invite_teachers')    return <InviteTeachersPage />;
      if (parent === 'students_import')    return <BulkImportPage />;
      if (parent === 'students_provision') return <AddSingleStudentPage />;
      if (parent === 'claim_slips')        return <ClaimSlipsPage />;
      if (parent === 'class_roster')       return <ClassRosterPage />;
      if (parent === 'people')             return <PeopleInvitesPage />;
      return <AdminPages page={parent} section={section} />;
    }
    if (view === 'teacher') {
      if (parent === 'classes')        return <TeacherPages page="classes" />;
      if (parent === 'timetable')      return <TeacherPages page="timetable" />;
      if (parent === 'homework')       return <TeacherPages page="homework" section={section} />;
      if (parent === 'progress')       return <TeacherPages page="progress" />;
      if (parent === 'attendance')     return <TeacherPages page="attendance" />;
      if (parent === 'timesheet')      return <TeacherPages page="timesheet" />;
      if (parent === 'tracking')       return <TeacherPages page="tracking" />;
      if (parent === 'reports')        return <TeacherPages page="reports" />;
      if (parent === 'lesson_planner') return <TeacherPages page="lesson_planner" plannerArgs={plannerArgs} />;
      return <TeacherDashboard />;
    }
    if (view === 'student') {
      return <StudentDashboard page={parent} section={section} onNav={handleNav} />;
    }
    return null;
  };

  return (
    <div key={renderKey} style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {claimId !== null ? (
        <div style={{ flex: 1, overflow: 'auto' }}>
          <ClaimPage identifier={claimId} onExit={() => { setClaimId(null); setView('landing'); setPage('dashboard'); }} />
        </div>
      ) : isAuth ? (
        <div style={{ flex: 1, overflow: 'auto' }}>
          {view === 'signup' ? <SignupPage /> : <LoginPage />}
        </div>
      ) : isApp ? (
        <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
          <Sidebar
            role={view}
            active={page}
            onNav={handleNav}
            onRoleSwitch={(role) => { setView(role); setPage('dashboard'); }}
            badges={comms ? { comms: comms.unread.total } : null}
            collapsed={sidebarCollapsed}
            centre={centreNav ? centreNav.centre : null}
            centres={centreNav ? centreNav.centres : null}
            planUsage={centreNav ? centreNav.planUsage : null}
            cloudStorage={view === 'admin' && sub ? { usedGb: sub.storageUsedGb ?? 0, totalGb: (sub.plan && sub.plan.storageGb) || 0 } : null}
            identityName={centreNav ? window.ONB_SESSION.name : null}
            onSwitchCentre={(id) => {
              window.__setCentre && window.__setCentre(id);
              // Follow the centre's branding accent (null → platform default).
              const c = centreNav && centreNav.centres.find(x => x.id === id);
              window.__setAccent && window.__setAccent((c && c.accent) || null);
            }}
            onAddCentre={() => { window.__centresIntent = { add: true }; window.__navigate('admin', 'centres'); }}
          />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: DS.canvas }}>
            {/* The header is sticky *inside* the scroll area so page content
                scrolls beneath it — that's what makes the glass blur visible. */}
            <div style={{ flex: 1, overflow: 'auto', position: 'relative' }}>
              <TopBar view={view} page={page} onBack={() => setView('landing')} accent={tweaks.accent}
                comms={comms} onNavigate={(role, pg) => window.__navigate(role, pg)}
                collapsed={sidebarCollapsed} onToggleSidebar={() => setSidebarCollapsed(c => !c)} />
              {renderContent()}
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, overflow: 'auto' }}>
          <LandingPage
            onEnterApp={() => enterApp('admin')}
            onLogin={() => { setView('login'); setPage('dashboard'); }}
            onGetStarted={() => { setView('signup'); setPage('dashboard'); }}
          />
        </div>
      )}

      <TweaksPanel>
        <TweakSection label="Brand" />
        <TweakColor label="Accent colour" value={accent} onChange={v => { setTweak('accent', v); window.__setAccent && window.__setAccent(v); }} />

            ['admin',    'dashboard',  'Admin — Dashboard'],

          ].map(([role, pg, label]) => {
            const isActive = pg === null ? view === 'landing' : view === role && page.split(':')[0] === pg;
            return (
              <button key={label}
                onClick={() => {
                  if (pg === null) { setView('landing'); }
                  else { setView(role); setPage(normalizePage(role, pg)); }
                }}
                style={{
                  padding: '6px 10px', borderRadius: 6,
                  border: `1px solid ${isActive ? (tweaks.accent + '55') : '#E5E7EB'}`,

                  color: isActive ? tweaks.accent : '#374151',
                  fontSize: 12, fontWeight: isActive ? 600 : 400,
                  cursor: 'pointer', textAlign: 'left',

            );
          })}
        </div>

  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
