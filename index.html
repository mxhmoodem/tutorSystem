<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#43b190",
  "density": "compact"
}/*EDITMODE-END*/;

// Build a breadcrumb trail (e.g. "Reports › All Reports") from the active page id
// using NAV_CONFIG, mirroring the sidebar's parent/sub structure.
const buildCrumbs = (role, page) => {
  const cfg = window.NAV_CONFIG[role];
  if (!cfg) return [];
  const parentId = window.navParentId(page);
  const section  = page.includes(':') ? page.split(':')[1] : null;
  const all = [...(cfg.items || []), ...(cfg.bottom || [])];
  // A sub matches the active page by exact id, a compound `<parent>:<section>` id,
  // or a "whole page" sub (Teachers) the page-parent folds onto (teacher_profile).
  const subMatch = (s) => s.id === page || s.id === `${parentId}:${section}` || parentId === s.id || parentId + 's' === s.id || parentId + 's' === s.id.split(':')[0];
  let item = all.find(i => i.id === parentId || i.id === parentId + 's' || parentId === i.id + 's');
  let sub  = null;
  if (!item) {
    // The page may live under a group whose subs don't share the parent id (Staff).
    for (const i of all) {
      if (Array.isArray(i.sub)) { const m = i.sub.find(subMatch); if (m) { item = i; sub = m; break; } }
    }
  }
  if (!item) item = all.find(i => page.startsWith(i.id));
  if (!item) return [{ label: parentId.charAt(0).toUpperCase() + parentId.slice(1) }];
  // Lead with the item's nav section (e.g. "People", "Academic") so the trail
  // reads section → page → sub-section (e.g. "Operations › Reports › Overview").
  const crumbs = [];
  if (item.section) crumbs.push({ label: item.section });
  crumbs.push({ label: item.label });
  if (!sub && section && Array.isArray(item.sub)) sub = item.sub.find(s => s.id === `${parentId}:${section}`);
  if (sub) crumbs.push({ label: sub.label });
  return crumbs;
};

// Format an ISO date (yyyy-mm-dd) as a short "6 Jan 2026" for the term tooltip.
const fmtTermDate = (iso) => {
  if (!iso) return '';
  const [y, m, d] = String(iso).split('-').map(Number);
  if (!y || !m || !d) return iso;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d} ${months[m - 1]} ${y}`;
};

// The header term indicator shows whichever academic term is running *today*.
// Admins configure the whole term schedule in Settings → Centre; we resolve the
// current term from today's date here, so it switches automatically as each new
// term begins (no manual flip). It's a centre-wide value, so we read the admin
// centre block from the settings store directly (localStorage isn't reactive
// across hook instances; reading on each render keeps it fresh on navigation).
const readTermIndicator = () => {
  try {
    const blob = JSON.parse(localStorage.getItem('settings_store_v1') || '{}');
    const c = (blob.admin && blob.admin.centre) || {};
    const { term, status } = resolveActiveTerm(getCentreTerms(c));
    if (term) return { name: term.name || 'Untitled term', start: term.start || '', end: term.end || '', status };
  } catch (e) {}
  return { name: 'No term set', start: '', end: '', status: 'none' };
};

// Account chip in the header's top-right cluster (moved out of the sidebar).
// Avatar + name + role that opens a small menu (Settings, Log out). Click-away
// close mirrors the CentreSwitcher / NotificationBell pattern.
const HeaderUserMenu = ({ role, name, roleLabel, color, onNavigate }) => {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    const onKey = (e) => { if (e.key === 'Escape') setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
    return () => { document.removeEventListener('mousedown', onDoc); document.removeEventListener('keydown', onKey); };
  }, [open]);
  const menuItem = (icon, label, onClick, danger) => (
    <button onClick={() => { setOpen(false); onClick && onClick(); }}
      onMouseEnter={(e) => { e.currentTarget.style.background = danger ? DS.dangerBg : DS.surface; }}
      onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; }}
      style={{
        display: 'flex', alignItems: 'center', gap: 9, width: '100%', textAlign: 'left',
        padding: '8px 10px', border: 'none', background: 'transparent', borderRadius: 7,
        fontSize: 13, color: danger ? DS.danger : DS.sub, cursor: 'pointer',
      }}>
      <Icon name={icon} size={15} color={danger ? DS.danger : DS.muted} />{label}
    </button>
  );
  return (
    <div ref={ref} style={{ position: 'relative' }}>
      <button onClick={() => setOpen(o => !o)} title={name}
        onMouseEnter={(e) => { if (!open) e.currentTarget.style.background = DS.surface; }}
        onMouseLeave={(e) => { if (!open) e.currentTarget.style.background = 'transparent'; }}
        style={{
          display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer',
          background: open ? DS.surface : 'transparent', border: 'none',
          borderRadius: 9, padding: '3px 6px 3px 3px', transition: 'background 0.12s',
        }}>
        <Avatar name={name} size={28} color={color} />
        <div style={{ minWidth: 0, textAlign: 'left', lineHeight: 1.15 }}>
          <div style={{ fontSize: 12.5, fontWeight: 600, color: DS.text, whiteSpace: 'nowrap' }}>{name}</div>
          <div style={{ fontSize: 10.5, color: DS.faint, whiteSpace: 'nowrap' }}>{roleLabel}</div>
        </div>
        <Icon name="chevron_d" size={14} color={DS.faint} />
      </button>

      {open && (
        <div style={{
          position: 'absolute', right: 0, top: '100%', marginTop: 8, width: 216, zIndex: 60,
          background: DS.bg, border: `1px solid ${DS.border}`, borderRadius: 12,
          boxShadow: DS.cardShadowHi, padding: 6,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '6px 8px 10px', borderBottom: `1px solid ${DS.border}`, marginBottom: 4 }}>
            <Avatar name={name} size={34} color={color} />
            <div style={{ minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: DS.text, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{name}</div>
              <div style={{ fontSize: 11.5, color: DS.muted }}>{roleLabel}</div>
            </div>
          </div>
          {menuItem('settings', 'Settings', () => onNavigate(role, 'settings'))}
          {menuItem('logout', 'Log out', () => window.__navigate && window.__navigate('landing'), true)}
        </div>
      )}
    </div>
  );
};

const TopBar = ({ view, page, comms, onNavigate, collapsed, onToggleSidebar, identityName, accountOwner }) => {
  const crumbs = buildCrumbs(view, page);
  const term = readTermIndicator();
  const termRange = term.start && term.end
    ? `${fmtTermDate(term.start)} – ${fmtTermDate(term.end)}` : '';
  // Dot + tooltip reflect whether the resolved term is running now, still to
  // come, or already finished.
  const termDot = term.status === 'active' ? '#16A34A'
    : term.status === 'upcoming' ? '#D97706' : '#9CA3AF';
  const periodTitle = term.status === 'active' ? (termRange ? `Current term · ${termRange}` : 'Current term')
    : term.status === 'upcoming' ? (term.start ? `Upcoming · starts ${fmtTermDate(term.start)}` : 'Upcoming term')
    : term.status === 'ended' ? (termRange ? `Most recent term · ${termRange}` : 'Most recent term')
    : 'No term scheduled';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 6,
      padding: '0 18px', height: 52,
      borderBottom: `1px solid ${DS.border}`,
      boxShadow: '0 1px 2px rgba(16,24,40,0.04)',
      // Glassmorphism: translucent white + blur so the grey content frosts
      // through as it scrolls under the sticky header.
      position: 'sticky', top: 0,
      background: 'rgba(255,255,255,0.72)',
      backdropFilter: 'saturate(180%) blur(12px)',
      WebkitBackdropFilter: 'saturate(180%) blur(12px)',
      flexShrink: 0, zIndex: 30,
    }}>
      {/* Sidebar collapse toggle */}
      <button onClick={onToggleSidebar} title={collapsed ? 'Expand sidebar' : 'Collapse sidebar'} style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: 'none', border: 'none', cursor: 'pointer',
        color: '#6B7280', padding: 7, borderRadius: 7, marginLeft: -4,
      }}>
        <Icon name="sidebar" size={17} />
      </button>
      <div style={{ width: 1, height: 18, background: DS.border, margin: '0 6px 0 2px' }} />

      {/* Breadcrumb trail */}
      <nav style={{ display: 'flex', alignItems: 'center', gap: 6, minWidth: 0, flex: 1 }}>
        {crumbs.map((c, i) => (
          <React.Fragment key={i}>
            {i > 0 && <Icon name="chevron_r" size={13} color={DS.faint} />}
            <span style={{
              fontSize: 13.5,
              fontWeight: i === crumbs.length - 1 ? 600 : 500,
              color: i === crumbs.length - 1 ? DS.text : DS.muted,
              whiteSpace: 'nowrap',
            }}>{c.label}</span>
          </React.Fragment>
        ))}
      </nav>

      {/* Active-centre chip (§1/§8) — the centre every centre-scoped screen is
          bound to, read from the single centreProfile record. The app accent
          follows this centre (window.__setAccent on switch), so switching is
          visibly obvious. Staff views only. */}
      {(view === 'admin' || view === 'teacher') && window.centreMetrics && (() => {
        const c = window.centreMetrics.getActiveCentre();
        return (
          <div title={`Active centre — ${c.name}`} style={{ display: 'flex', alignItems: 'center', gap: 7, padding: '3px 11px 3px 4px', border: `1px solid ${DS.border}`, borderRadius: 999, marginRight: 4 }}>
            <div style={{ width: 20, height: 20, borderRadius: 6, background: DS.accent, color: '#fff', fontSize: 9.5, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', letterSpacing: '-0.3px' }}>{(c.logo || c.name || 'C').slice(0, 2).toUpperCase()}</div>
            <span style={{ fontSize: 12, fontWeight: 600, color: DS.sub, whiteSpace: 'nowrap', maxWidth: 150, overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.name}</span>
          </div>
        );
      })()}

      {/* Term indicator — the term running today (auto-resolved from the centre's
          term schedule); status colours the dot, date range shows on hover. */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }} title={periodTitle}>
        <div style={{ width: 6, height: 6, borderRadius: '50%', background: termDot }} />
        <span style={{ fontSize: 12, color: '#6B7280' }}>{term.name}</span>
      </div>

      {/* Right-hand action cluster: Settings · Notifications · Account. */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginLeft: 4 }}>
        {/* Settings — relocated from the sidebar; sits beside notifications. */}
        <button onClick={() => onNavigate(view, 'settings')} title="Settings"
          style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#6B7280', padding: 5, borderRadius: 7, display: 'flex' }}
          onMouseEnter={(e) => { e.currentTarget.style.background = DS.surface; }}
          onMouseLeave={(e) => { e.currentTarget.style.background = 'none'; }}>
          <Icon name="settings" size={17} />
        </button>

        {/* Live notification bell — aggregates unread announcements + messages */}
        {comms && window.NotificationBell
          ? <NotificationBell comms={comms} onNavigate={onNavigate} />
          : (
            <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#6B7280', padding: '4px', display: 'flex' }}>
              <Icon name="bell" size={16} />
            </button>
          )}

        <div style={{ width: 1, height: 22, background: DS.border, margin: '0 4px' }} />

        {/* Account chip + menu (moved out of the sidebar's bottom dock). */}
        {(() => {
          const cfg = window.NAV_CONFIG[view] || {};
          const userName = identityName || (view === 'superadmin' ? 'Marcus Hale' : view === 'admin' ? 'Lisa Chen' : view === 'teacher' ? 'Sarah Clarke' : 'Oliver Chen');
          // The account owner's real capability is "Account Owner", not "Centre
          // Admin" (§3); a plain centre admin keeps the centre-admin label.
          const roleLabel = (view === 'admin' && accountOwner) ? 'Account Owner' : cfg.label;
          return <HeaderUserMenu role={view} name={userName} roleLabel={roleLabel} color={cfg.color} onNavigate={onNavigate} />;
        })()}
      </div>
    </div>
  );
};

// ── ACCOUNT-tier page wrappers (§3) ──────────────────────────────────────────
// Plans & Billing and Storage are account-wide concerns, moved out of Settings
// into their own owner-only routes. They REUSE the existing components
// (window.BillingTab / window.StorageAdminPanel) inside a padded page shell —
// nothing is forked.
const AccountPageShell = ({ title, subtitle, children }) => (
  <div style={{ padding: 32 }}>
    <div style={{ maxWidth: 1240, margin: '0 auto' }}>
      {/* Account-tier band so the owner always knows an action here is account-wide,
          not scoped to one centre (§8). */}
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, marginBottom: 10, padding: '3px 10px', borderRadius: 999, background: DS.accentLight, color: DS.accent, fontSize: 11, fontWeight: 700, letterSpacing: '0.04em', textTransform: 'uppercase' }}>
        <Icon name="grid" size={12} /> Account-wide
      </div>
      <PageHeader title={title} subtitle={subtitle} />
      {children}
    </div>
  </div>
);
const AccountLocked = () => (
  <AccountPageShell title="Account area" subtitle="This section is managed by the account owner.">
    <EmptyState icon="lock" title="Owner-only area"
      message="Centres, plans, billing and storage are managed by the account owner. Ask your account owner if you need a change here." />
  </AccountPageShell>
);
const AccountBillingPage = () => (
  <AccountPageShell title="Plans & Billing" subtitle="Your subscription, pooled seats & storage, and billing details — account-wide.">
    {window.BillingTab ? <window.BillingTab /> : null}
  </AccountPageShell>
);
const AccountStoragePage = () => (
  <AccountPageShell title="Storage" subtitle="Pooled cloud storage across every centre in your account.">
    {window.StorageAdminPanel ? <window.StorageAdminPanel /> : null}
  </AccountPageShell>
);

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView]     = React.useState('landing');
  const [page, setPage]     = React.useState('dashboard');
  const [plannerArgs, setPlannerArgs] = React.useState(null);
  const [renderKey, setRenderKey] = React.useState(0);
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  // Public account-claim link (teacher/student invite). When set, the claim page
  // is shown full-screen over the app/landing. `''` is a valid (not-found) id, so
  // we gate on `!== null`. window.__openClaim(id) is the entry point.
  const [claimId, setClaimId] = React.useState(null);

  // Admin-settable primary accent. Persisted to localStorage so it survives
  // reloads independently of the dev Tweaks panel (which writes to disk). The
  // effective accent is the admin override when set, otherwise the Tweaks value.
  const [accentOverride, setAccentOverride] = React.useState(() => {
    try { return localStorage.getItem('tutoros.accent') || null; } catch (e) { return null; }
  });
  const accent = accentOverride || tweaks.accent;
  React.useEffect(() => {
    // Settings → Appearance writes the live accent through this bridge.
    window.__setAccent = (hex) => {
      try { hex ? localStorage.setItem('tutoros.accent', hex) : localStorage.removeItem('tutoros.accent'); } catch (e) {}
      setAccentOverride(hex || null);
    };
    window.__getAccent = () => { try { return localStorage.getItem('tutoros.accent') || window.DS.accent; } catch (e) { return window.DS.accent; } };
    return () => { delete window.__setAccent; delete window.__getAccent; };
  }, []);

  // Active centre — a staff account can be linked to several centres (each its own
  // subscription); the sidebar switcher lets them hop between them. A cosmetic
  // reframe in this prototype (centre name/branding), persisted like the accent.
  const CENTRE_FALLBACK = (window.ONB_CENTRE && window.ONB_CENTRE.id) || 'bm';
  const [activeCentre, setActiveCentre] = React.useState(() => {
    try { return localStorage.getItem('tutoros.activeCentre') || CENTRE_FALLBACK; } catch (e) { return CENTRE_FALLBACK; }
  });
  React.useEffect(() => {
    window.__setCentre = (id) => {
      try { id ? localStorage.setItem('tutoros.activeCentre', id) : localStorage.removeItem('tutoros.activeCentre'); } catch (e) {}
      setActiveCentre(id || CENTRE_FALLBACK);
    };
    window.__getCentre = () => { try { return localStorage.getItem('tutoros.activeCentre') || CENTRE_FALLBACK; } catch (e) { return CENTRE_FALLBACK; } };
    return () => { delete window.__setCentre; delete window.__getCentre; };
  }, []);

  // Resolve the signed-in staff identity's memberships → one switcher entry per
  // centre (with its granted roles). Admin/teacher only; students/superadmin keep
  // the static product header. Reuses the onboarding store's membership list.
  const sub = window.useSubscriptionStore ? window.useSubscriptionStore() : null;
  // Subscribe so the sidebar storage meter re-derives live when files are deleted
  // or an add-on block / plan changes (usage is computed, never stored).
  const stg = window.useStorageStore ? window.useStorageStore() : null;

  // Account ownership (§3) — drives the ACCOUNT-tier nav + the topbar role label.
  // Derived, never stored on a person (permissions.isAccountOwner over the
  // subscription's ownerUserId). Only the owner sees Centres / Plans / Storage.
  const accountOwner = React.useMemo(() =>
    (view === 'admin' && window.isAccountOwner && window.ONB_SESSION)
      ? window.isAccountOwner(window.ONB_SESSION, sub) : false,
    [view, sub && sub.ownerUserId]);
  const centreNav = React.useMemo(() => {
    if (!sub || (view !== 'admin' && view !== 'teacher') || !window.ONB_SESSION) return null;
    // The Centres page (subscription store) is the single source of truth for the
    // account's owned centres; the switcher lists the active (non-archived) ones so
    // a centre added there shows up here live (the store is cross-instance reactive).
    const list = (sub.centres || []).filter(c => c.status !== 'archived');
    if (!list.length) return null;
    const centres = list.map(c => ({ id: c.id, name: c.name, accent: c.accent || null, city: c.city || '', roles: [c.isPrimary ? 'Primary centre' : 'Centre'] }));
    const activeId = centres.some(c => c.id === activeCentre) ? activeCentre : centres[0].id;
    const active = centres.find(c => c.id === activeId) || centres[0];
    return { centre: { id: activeId, name: active.name }, centres, planUsage: { used: (sub.centres || []).length, max: sub.plan.maxCentres } };
  }, [sub && sub.centres, sub && sub.planId, view, activeCentre]);

  // Communications state is lifted here (localStorage isn't reactive) so the
  // notification bell + sidebar badges update live across the page, topbar and
  // sidebar. The context is the active role's demo identity (see COMMS_SELF).
  // Public, full-screen, unauthenticated views — gated ahead of the app shell
  // (no sidebar/topbar), like the landing & claim pages.
  const isAuth = view === 'login' || view === 'signup';
  const commsRole = (view === 'landing' || isAuth) ? 'admin' : view;
  const commsCtx  = React.useMemo(() => window.commsContext ? window.commsContext(commsRole) : null, [commsRole]);
  const comms     = window.useComms ? window.useComms(commsCtx) : null;

  React.useLayoutEffect(() => {
    if (window.DS) {
      window.DS.accent       = accent;
      window.DS.accentHover  = accent;
      window.DS.accentLight  = accent + '18';
      window.DS.accentBorder = accent + '55';
    }
    setRenderKey(k => k + 1);
  }, [accent]);

  // Expand a bare nav id (e.g. "reports") to its first sub-section ("reports:overview")
  // when that item has a dropdown, so the active section is always canonical — this
  // keeps the sidebar dropdown + sub-item highlighting consistent no matter the entry
  // point (sidebar click, PPTX export, Tweaks panel).
  const normalizePage = (role, pg) => {
    if (!pg || pg.includes(':')) return pg || 'dashboard';
    const cfg = window.NAV_CONFIG[role];
    if (!cfg) return pg;
    const item = [...(cfg.items || []), ...(cfg.bottom || [])].find(i => i.id === pg);
    return item && item.sub && item.sub.length ? item.sub[0].id : pg;
  };

  const enterApp = (role, pg) => { setView(role || 'admin'); setPage(normalizePage(role || 'admin', pg || 'dashboard')); };

  // Expose navigation for PPTX export
  React.useEffect(() => {
    window.__navigate = (role, pg) => {
      setClaimId(null);   // leaving a claim link returns to the app
      if (role === 'landing') { setView('landing'); setPage('dashboard'); }
      // Public auth views aren't role nav — don't normalize against NAV_CONFIG.
      else if (role === 'login' || role === 'signup') { setView(role); setPage('dashboard'); }
      // The standalone "Set up centre" page is gone — setup is now a right-hand drawer
      // on the Centres page. Rewrite any admin/setup navigation to open it for the
      // active centre (covers the dashboard banner, signup CTA and sub-flow back links).
      else if (role === 'admin' && pg === 'setup') {
        window.__centresIntent = { setup: (window.__getCentre ? window.__getCentre() : null) };
        setView('admin'); setPage('centres');
      }
      // Plans & Billing and Storage moved out of Settings into their own ACCOUNT-tier
      // routes (§3); rewrite the old settings deep links so existing CTAs still land.
      else if (role === 'admin' && pg === 'settings:billing') { setView('admin'); setPage('plans'); }
      else if (role === 'admin' && pg === 'settings:storage') { setView('admin'); setPage('storage'); }
      else { setView(role); setPage(normalizePage(role, pg)); }
    };
    // Open the public account-claim page for a mock invite token / claim code.
    window.__openClaim = (id) => setClaimId(id || '');
    window.__openLessonPlanner = (group, date, mode) => {
      setPlannerArgs({ group, date, mode });
      setView('teacher');
      setPage('lesson_planner');
    };
  }, []);
  const handleNav = (p)   => { setPlannerArgs(null); setPage(normalizePage(view, p)); };
  const isApp = view !== 'landing' && !isAuth;

  const renderContent = () => {
    // Nav items with sub-sections route on a `<parent>:<section>` id (e.g.
    // reports:browse). Split the active page into its parent and section so the
    // owning page can open straight to that section.
    const parent  = page.split(':')[0];
    const section = page.includes(':') ? page.split(':')[1] : null;

    if (parent === 'settings') return <SettingsPage role={view} section={section} />;
    // Communications is shared across all roles (announcements + messages),
    // backed by the lifted comms state. Superadmin's view is platform-scoped.
    if (parent === 'comms' && comms) return <CommunicationsPage role={view} section={section} comms={comms} />;
    if (view === 'superadmin') {
      if (parent === 'dashboard') return <SuperAdminDashboard />;
      return <SuperAdminPages page={parent} />;
    }
    if (view === 'admin') {
      if (parent === 'dashboard') return <AdminDashboard />;
      // ── ACCOUNT tier (§3) — owner-only. Nav hides these for non-owners; this is
      //    the defence-in-depth route guard for a direct navigation / deep link.
      if (parent === 'centres')   return accountOwner ? <CentresPage />       : <AccountLocked />;
      if (parent === 'plans')     return accountOwner ? <AccountBillingPage /> : <AccountLocked />;
      if (parent === 'storage')   return accountOwner ? <AccountStoragePage /> : <AccountLocked />;
      if (parent === 'reports')   return <AdminReportsConfig section={section} />;
      // Onboarding flows (Onboarding.jsx) — full-page admin routes reached via adminNav.
      // (The "Set up centre" checklist is now the Centres page's right-hand drawer;
      // admin/setup is rewritten to it in __navigate, so there's no standalone route.)
      if (parent === 'invite_teachers')    return <InviteTeachersPage />;
      if (parent === 'students_import')    return <BulkImportPage />;
      if (parent === 'students_provision') return <AddSingleStudentPage />;
      if (parent === 'claim_slips')        return <ClaimSlipsPage />;
      if (parent === 'class_roster')       return <ClassRosterPage />;
      if (parent === 'people')             return <PeopleInvitesPage />;
      return <AdminPages page={parent} section={section} />;
    }
    if (view === 'teacher') {
      if (parent === 'classes')        return <TeacherPages page="classes" />;
      if (parent === 'class_detail')   return <TeacherPages page="class_detail" />;
      if (parent === 'students')       return <TeacherPages page="students" />;
      // Shared rich profile (AdminPages.jsx), read-only for teachers — no Fees/Account tabs.
      if (parent === 'student_profile') return <StudentProfilePage role="teacher" />;
      if (parent === 'timetable')      return <TeacherPages page="timetable" />;
      if (parent === 'homework')       return <TeacherPages page="homework" section={section} />;
      if (parent === 'progress')       return <TeacherPages page="progress" />;
      if (parent === 'attendance')     return <TeacherPages page="attendance" />;
      if (parent === 'timesheet')      return <TeacherPages page="timesheet" />;
      if (parent === 'tracking')       return <TeacherPages page="tracking" />;
      if (parent === 'reports')        return <TeacherPages page="reports" />;
      if (parent === 'lesson_planner') return <TeacherPages page="lesson_planner" plannerArgs={plannerArgs} />;
      return <TeacherDashboard />;
    }
    if (view === 'student') {
      return <StudentDashboard page={parent} section={section} onNav={handleNav} />;
    }
    return null;
  };

  return (
    <div key={renderKey} style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      {claimId !== null ? (
        <div style={{ flex: 1, overflow: 'auto' }}>
          <ClaimPage identifier={claimId} onExit={() => { setClaimId(null); setView('landing'); setPage('dashboard'); }} />
        </div>
      ) : isAuth ? (
        <div style={{ flex: 1, overflow: 'auto' }}>
          {view === 'signup' ? <SignupPage /> : <LoginPage />}
        </div>
      ) : isApp ? (
        <div style={{ display: 'flex', flex: 1, overflow: 'hidden' }}>
          <Sidebar
            role={view}
            active={page}
            onNav={handleNav}
            onRoleSwitch={(role) => { setView(role); setPage('dashboard'); }}
            badges={comms ? { comms: comms.unread.total } : null}
            accountOwner={accountOwner}
            collapsed={sidebarCollapsed}
            centre={centreNav ? centreNav.centre : null}
            centres={centreNav ? centreNav.centres : null}
            planUsage={centreNav ? centreNav.planUsage : null}
            cloudStorage={view === 'admin' && sub && window.stgUsageByAccount ? (() => {
              // Derived live from file records — never a stored running total. Admin sees
              // their own account's usage against the plan quota (+ any add-on blocks).
              const GB = window.STORAGE_GB || (1024 ** 3);
              const acctId = window.STG_SELF_ACCT || 'acc_brightminds';
              const used = window.stgUsageByAccount(acctId);
              const quota = window.stgQuotaForAccount({ accountId: acctId, planId: sub.planId });
              return { usedGb: +(used / GB).toFixed(1), totalGb: Math.round(quota / GB) };
            })() : null}
            identityName={view === 'teacher'
              ? (window.teacherMetrics ? window.teacherMetrics.getPrincipal().name : 'Sarah Clarke')
              : (centreNav ? window.ONB_SESSION.name : null)}
            onSwitchCentre={(id) => {
              window.__setCentre && window.__setCentre(id);
              // Follow the centre's branding accent (null → platform default).
              const c = centreNav && centreNav.centres.find(x => x.id === id);
              window.__setAccent && window.__setAccent((c && c.accent) || null);
            }}
            onAddCentre={() => { window.__centresIntent = { add: true }; window.__navigate('admin', 'centres'); }}
          />
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', background: DS.canvas }}>
            {/* Persistent banner while a platform owner previews a tenant view
                (Superadmin impersonation). Visible across every view, with an
                Exit that writes the exit audit entry. */}
            {window.SAImpersonationBanner && <window.SAImpersonationBanner />}
            {/* The header is sticky *inside* the scroll area so page content
                scrolls beneath it — that's what makes the glass blur visible. */}
            <div style={{ flex: 1, overflow: 'auto', position: 'relative' }}>
              <TopBar view={view} page={page}
                comms={comms} onNavigate={(role, pg) => window.__navigate(role, pg)}
                identityName={view === 'teacher'
              ? (window.teacherMetrics ? window.teacherMetrics.getPrincipal().name : 'Sarah Clarke')
              : (centreNav ? window.ONB_SESSION.name : null)}
                accountOwner={accountOwner}
                collapsed={sidebarCollapsed} onToggleSidebar={() => setSidebarCollapsed(c => !c)} />
              {renderContent()}
            </div>
          </div>
        </div>
      ) : (
        <div style={{ flex: 1, overflow: 'auto' }}>
          <LandingPage
            onEnterApp={() => enterApp('admin')}
            onLogin={() => { setView('login'); setPage('dashboard'); }}
            onGetStarted={() => { setView('signup'); setPage('dashboard'); }}
          />
        </div>
      )}

      <TweaksPanel>
        <TweakSection label="Brand" />
        <TweakColor label="Accent colour" value={accent} onChange={v => { setTweak('accent', v); window.__setAccent && window.__setAccent(v); }} />
        <TweakSection label="Navigate to" />
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          {[
            ['landing',     null,           'Marketing site'],
            ['login',       'login',        'Public — Log in'],
            ['signup',      'signup',       'Public — Sign up'],
            ['superadmin',  'dashboard',    'SuperAdmin — Overview'],
            ['superadmin',  'centres',      'SuperAdmin — Centres'],
            ['superadmin',  'users',        'SuperAdmin — Users'],
            ['superadmin',  'revenue',      'SuperAdmin — Revenue'],
            ['superadmin',  'engagement',   'SuperAdmin — Engagement'],
            ['superadmin',  'system',       'SuperAdmin — System Health'],
            ['superadmin',  'comms',        'SuperAdmin — Communications'],
            ['superadmin',  'security',     'SuperAdmin — Security & Audit'],
            ['superadmin',  'controls',     'SuperAdmin — Platform Controls'],
            ['superadmin',  'settings',     'SuperAdmin — Settings'],
            ['admin',    'dashboard',  'Admin — Dashboard'],
            ['admin',    'centres',    'Admin — Centres'],
            ['admin',    'plans',      'Admin — Plans & Billing'],
            ['admin',    'storage',    'Admin — Storage'],
            ['admin',    'setup',      'Admin — Set up centre'],
            ['admin',    'people',     'Admin — People & invites'],
            ['admin',    'invite_teachers',    'Admin — Invite teachers'],
            ['admin',    'students_import',     'Admin — Import students (CSV)'],
            ['admin',    'students_provision',  'Admin — Add single student'],
            ['admin',    'claim_slips',         'Admin — Claim slips'],
            ['admin',    'class_roster',        'Admin — Class roster'],
            ['admin',    'students',   'Admin — Students'],
            ['admin',    'classes',    'Admin — Classes'],
            ['admin',    'teachers',   'Admin — Staff · Teachers'],
            ['admin',    'team',       'Admin — Staff · Roles & access'],
            ['admin',    'timesheets:review', 'Admin — Staff · Timesheets'],
            ['admin',    'schedule',   'Admin — Schedule'],
            ['admin',    'invoices',   'Admin — Invoices'],
            ['admin',    'reports',    'Admin — Reports'],
            ['admin',    'comms',      'Admin — Communications'],
            ['admin',    'settings',   'Admin — Settings'],
            ['teacher',  'dashboard',  'Teacher — Dashboard'],
            ['teacher',  'classes',    'Teacher — My Classes'],
            ['teacher',  'timetable',  'Teacher — Timetable'],
            ['teacher',  'lesson_planner','Teacher — Lesson Planner'],
            ['teacher',  'homework',   'Teacher — Homework'],
            ['teacher',  'attendance', 'Teacher — Attendance'],
            ['teacher',  'timesheet',  'Teacher — Timesheet'],
            ['teacher',  'progress',   'Teacher — Progress'],
            ['teacher',  'tracking',   'Teacher — Tracking'],
            ['teacher',  'reports',    'Teacher — Reports'],
            ['teacher',  'comms',      'Teacher — Communications'],
            ['teacher',  'settings',   'Teacher — Settings'],
            ['student',  'dashboard',  'Student — Overview'],
            ['student',  'homework',   'Student — Homework'],
            ['student',  'progress',   'Student — Progress'],
            ['student',  'sessions',   'Student — Sessions'],
            ['student',  'reports',    'Student — Reports'],
            ['student',  'comms',      'Student — Communications'],
            ['student',  'settings',   'Student — Settings'],
          ].map(([role, pg, label]) => {
            const isActive = pg === null ? view === 'landing' : view === role && page.split(':')[0] === pg;
            return (
              <button key={label}
                onClick={() => {
                  if (pg === null) { setView('landing'); }
                  else { setView(role); setPage(normalizePage(role, pg)); }
                }}
                style={{
                  padding: '6px 10px', borderRadius: 6,
                  border: `1px solid ${isActive ? (tweaks.accent + '55') : '#E5E7EB'}`,
                  background: isActive ? (tweaks.accent + '18') : '#F9FAFB',
                  color: isActive ? tweaks.accent : '#374151',
                  fontSize: 12, fontWeight: isActive ? 600 : 400,
                  cursor: 'pointer', textAlign: 'left',
                }}
              >{label}</button>
            );
          })}
        </div>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
